name: Test with Poetry

# Run on push or pull request to main (or change branch as needed)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Get your code
      - uses: actions/checkout@v3

      # 2. Install Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3. Install Poetry
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      # 4. Install dependencies
      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      # 5. Run tests
      - name: Run tests
        run: poetry run pytest